server:
  port: 8080

spring:
  application:
    name: personal-finance-tracker

  datasource:
    url: ${PFT_DB_URL:jdbc:sqlite:/data/pft.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA foreign_keys = ON;

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

  # Flyway owns the schema; JPA entities must line up with the migrations.

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

pft:
  base-currency: CAD
  cors:
    allowed-origins: ${PFT_CORS_ORIGINS:http://localhost:5173}
  fx:
    provider-url: https://api.exchangerate.host/latest
